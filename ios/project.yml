name: Vibe
options:
  bundleIdPrefix: com.vibegram
settings:
  base:
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
    PRODUCT_BUNDLE_IDENTIFIER: com.vibegram.app
    PRODUCT_NAME: Vibe
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    SWIFT_OBJC_BRIDGING_HEADER: Sources/Packet/Packet-Bridging-Header.h
    OTHER_LDFLAGS[sdk=iphoneos*][arch=arm64]:
      - "$(SRCROOT)/Vendor/Packet/ios-arm64/libphantom_client.a"
      - "-lresolv"
    OTHER_LDFLAGS[sdk=iphonesimulator*][arch=arm64]:
      - "$(SRCROOT)/Vendor/Packet/ios-sim-arm64/libphantom_client.a"
      - "-lresolv"
    OTHER_LDFLAGS[sdk=iphonesimulator*][arch=x86_64]:
      - "$(SRCROOT)/Vendor/Packet/ios-sim-x86_64/libphantom_client.a"
      - "-lresolv"
packages:
  GiphyUISDK:
    url: https://github.com/Giphy/giphy-ios-sdk
    from: 2.2.16
targets:
  Vibe:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App
      - path: Sources
      - path: ChatModule
        excludes:
          - ChatHomeListView.swift
          - ChatListViewCells.swift.patch
          - VibeCallUiCoordinator.swift
    dependencies:
      - package: GiphyUISDK
        product: GiphyUISDK
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Vibe
        UILaunchScreen: {}
        LSRequiresIPhoneOS: true
        GIPHY_API_KEY: sXpGFDGZs0Dv1mmNFvYaGUvYwKX0PWIh
        NSFaceIDUsageDescription: Use Face ID to unlock privacy controls and reveal protected account data.
        NSCameraUsageDescription: Use the camera for video calls and to capture story photos and videos.
        NSMicrophoneUsageDescription: Use the microphone for calls, story videos, and voice messages.
        NSSpeechRecognitionUsageDescription: Transcribe your speech to text so you can dictate messages to the agent.
        NSPhotoLibraryUsageDescription: Use the photo library to choose photos and videos for stories.
        NSPhotoLibraryAddUsageDescription: Save edited stories to your photo library when you choose download.
        NSLocalNetworkUsageDescription: Vibe connects directly to the Vibe bridge on your Mac over your local network for faster, private agent updates when your phone and Mac share Wi‑Fi.
        NSBonjourServices:
          - _vibegram-bridge._tcp
        UIBackgroundModes:
          - audio
          - voip
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIViewControllerBasedStatusBarAppearance: true
    settings:
      base:
        DEVELOPMENT_TEAM: BXY4DH6H7D
        CODE_SIGN_STYLE: Automatic
  VibeUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: VibeUITests
    dependencies:
      - target: Vibe
    settings:
      base:
        PRODUCT_NAME: VibeUITests
        PRODUCT_MODULE_NAME: VibeUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.vibegram.app.uitests
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: BXY4DH6H7D
        TEST_TARGET_NAME: Vibe
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        # Do not inherit app PRODUCT_NAME "Vibe" or swiftmodules collide.
        SWIFT_OBJC_BRIDGING_HEADER: ""
        OTHER_LDFLAGS: ""
schemes:
  Vibe:
    build:
      targets:
        Vibe: all
        VibeUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VibeUITests
    archive:
      config: Release
