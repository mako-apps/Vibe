<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonshot Together - Hero Concept</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #090a0f;
            --text-main: #f5f5f7;
            --text-muted: #8a8d98;
            --glow-blue: rgba(43, 90, 204, 0.4);
            --glow-silver: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract glowing background effects */
        .glow-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .glow-1 {
            position: absolute;
            top: -20%;
            left: 20%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--glow-silver) 0%, rgba(0,0,0,0) 60%);
            opacity: 0.8;
            filter: blur(80px);
            animation: pulse 10s infinite alternate;
        }

        .glow-2 {
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--glow-blue) 0%, rgba(0,0,0,0) 70%);
            opacity: 0.6;
            filter: blur(100px);
            animation: pulse 12s infinite alternate-reverse;
        }

        .glow-3 {
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(20, 40, 100, 0.5) 0%, rgba(0,0,0,0) 70%);
            opacity: 0.5;
            filter: blur(120px);
            animation: pulse 15s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); opacity: 0.5; }
            50% { transform: scale(1.1) translate(2%, 2%); opacity: 0.7; }
            100% { transform: scale(0.9) translate(-2%, -2%); opacity: 0.5; }
        }

        /* Noise overlay for texture */
        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            z-index: 1;
            pointer-events: none;
        }

        /* Main Hero Content */
        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(180deg, #ffffff 0%, #b3b3b3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 20px rgba(255, 255, 255, 0.1);
        }

        .subtitle {
            font-size: 1.125rem;
            color: var(--text-muted);
            margin-bottom: 4rem;
            font-weight: 300;
        }

        .central-feature {
            margin-bottom: 2rem;
        }

        .feature-title {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            letter-spacing: 0.01em;
        }

        .action-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 0.75rem 2rem;
            border-radius: 100px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            margin-bottom: 1rem;
        }

        .action-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .stats-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 4rem;
        }

        .stats-text span {
            margin: 0 0.5rem;
        }

        /* Glassmorphism Action Cards */
        .cards-container {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            width: 340px;
            text-align: left;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 140px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .glass-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(43, 90, 204, 0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            color: #fff;
        }

        .card-icon {
            opacity: 0.7;
            width: 20px;
            height: 20px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .add-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .invite-btn-small {
            background: #fff;
            color: #000;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .invite-btn-small:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
        }

        .instruction-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            margin-top: 2rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title { font-size: 2.5rem; }
            .cards-container { flex-direction: column; align-items: center; }
            .glass-card { width: 100%; max-width: 340px; }
        }
    </style>
</head>
<body>
    <div class="glow-bg">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
        <div class="glow-3"></div>
    </div>
    
    <div class="noise-overlay"></div>

    <main class="hero-content">
        <h1 class="title">Moonshot Together</h1>
        <p class="subtitle">Invite friends to Kimi for guaranteed Membership Credits</p>

        <div class="central-feature">
            <h2 class="feature-title">1-Year Membership Credits</h2>
            <button class="action-button">Invite to earn chances</button>
            <div class="stats-text">
                Draws Left: 0 <span>|</span> <a href="#" style="color: inherit; text-decoration: none;">My Prizes &gt;</a>
            </div>
        </div>

        <p class="instruction-text">Complete any task below, and both of you get [ 1 ] draw.</p>

        <div class="cards-container">
            <!-- Card 1 -->
            <div class="glass-card">
                <div class="card-header">
                    <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                    <span>Invite a friend to join Kimi</span>
                </div>
                <div class="card-footer">
                    <button class="add-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                    <button class="invite-btn-small">Invite</button>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="glass-card">
                <div class="card-header">
                    <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                    <span>Invite a friend to subscribe to Kimi Membership</span>
                </div>
                <div class="card-footer">
                    <button class="add-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                    <button class="invite-btn-small">Invite</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
